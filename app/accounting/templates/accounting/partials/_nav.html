{% macro accounting_nav(company_id, endpoint) %}
<div class="space-y-0.5">
  <a href="{{ url_for('accounting.index', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if endpoint == 'accounting.index' else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if endpoint == 'accounting.index' else 'bg-slate-300' }}"></span>
    Resumen
  </a>
  <a href="{{ url_for('accounting.expenses_list', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if 'expenses' in endpoint else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if 'expenses' in endpoint else 'bg-slate-300' }}"></span>
    Gastos
  </a>
  <a href="{{ url_for('accounting.income_list', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if 'income' in endpoint else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if 'income' in endpoint else 'bg-slate-300' }}"></span>
    Ingresos
  </a>
  <a href="{{ url_for('accounting.journal_list', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if 'journal' in endpoint else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if 'journal' in endpoint else 'bg-slate-300' }}"></span>
    Libro Diario
  </a>
  <a href="{{ url_for('accounting.ledger', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if endpoint == 'accounting.ledger' else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if endpoint == 'accounting.ledger' else 'bg-slate-300' }}"></span>
    Libro Mayor
  </a>
  <a href="{{ url_for('accounting.chart_of_accounts', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if endpoint == 'accounting.chart_of_accounts' else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if endpoint == 'accounting.chart_of_accounts' else 'bg-slate-300' }}"></span>
    Plan de Cuentas
  </a>
  <a href="{{ url_for('accounting.trial_balance', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if endpoint == 'accounting.trial_balance' else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if endpoint == 'accounting.trial_balance' else 'bg-slate-300' }}"></span>
    Balanza de Comprobación
  </a>
  <a href="{{ url_for('accounting.reports', company_id=company_id) }}"
    class="flex items-center gap-3 px-3 py-2 rounded-md {{ 'bg-emerald-50 text-emerald-700 font-medium' if endpoint == 'accounting.reports' else 'text-slate-600 hover:bg-slate-50' }} text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full {{ 'bg-emerald-500' if endpoint == 'accounting.reports' else 'bg-slate-300' }}"></span>
    Reportes
  </a>

  <div class="pt-4 pb-1 px-3">
    <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Acciones rápidas</span>
  </div>
  <button data-action="open-drawer" data-url="{{ url_for('accounting.create_expense', company_id=company_id) }}" data-title="Registrar Gasto"
    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-md text-slate-600 hover:bg-slate-50 text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
    Registrar Gasto
  </button>
  <button data-action="open-drawer" data-url="{{ url_for('accounting.create_income', company_id=company_id) }}" data-title="Registrar Ingreso"
    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-md text-slate-600 hover:bg-slate-50 text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
    Registrar Ingreso
  </button>
  <button data-action="open-drawer" data-url="{{ url_for('accounting.create_journal_entry', company_id=company_id) }}" data-title="Nuevo Asiento"
    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-md text-slate-600 hover:bg-slate-50 text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
    Asiento Manual
  </button>
  <button data-action="open-drawer" data-url="{{ url_for('accounting.create_project', company_id=company_id) }}" data-title="Nuevo Proyecto"
    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-md text-slate-600 hover:bg-slate-50 text-sm transition-colors">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
    Nuevo Proyecto
  </button>
</div>
{% endmacro %}
