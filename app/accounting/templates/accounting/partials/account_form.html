<form method="POST"
  action="{{ url_for('accounting.edit_account', company_id=company.id, account_id=account.id) if account else url_for('accounting.create_account', company_id=company.id) }}"
  data-drawer-form data-success-message="{{ 'Cuenta actualizada.' if account else 'Cuenta creada.' }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="p-4 md:p-6 space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Código de cuenta</label>
        <input type="text" name="code" value="{{ account.code if account else '' }}" placeholder="Ej: 1100"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de cuenta <span class="text-rose-500">*</span></label>
        <select name="type" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
          {% for t in AccountType %}
          {% set labels = {'asset': 'Activo', 'liability': 'Pasivo', 'equity': 'Patrimonio', 'revenue': 'Ingreso', 'expense': 'Gasto'} %}
          <option value="{{ t.value }}" {{ 'selected' if account and account.type == t }}>{{ labels.get(t.value, t.value) }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de la cuenta <span class="text-rose-500">*</span></label>
      <input type="text" name="name" value="{{ account.name if account else '' }}" required placeholder="Ej: Caja y Bancos"
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
      <textarea name="description" rows="2" placeholder="Descripción opcional..."
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none">{{ account.description if account else '' }}</textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Uso predeterminado</label>
      <select name="default_purpose" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
        <option value="">Sin uso predeterminado</option>
        <option value="invoice_payment_revenue" {{ 'selected' if account and account.default_purpose == 'invoice_payment_revenue' else '' }}>
          Ingresos por pagos de factura
        </option>
      </select>
      <p class="text-xs text-slate-400 mt-1">Use esta opcion en una cuenta de ingresos, por ejemplo Ventas de Productos.</p>
    </div>
    {% if account %}
    <div class="flex items-center gap-3">
      <input type="checkbox" name="is_active" id="is_active" value="true" {{ 'checked' if account.is_active }}
        class="rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
      <label for="is_active" class="text-sm text-slate-700">Cuenta activa</label>
    </div>
    {% endif %}
    <div class="border-t border-slate-200 pt-4">
      <button type="submit" class="w-full px-4 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors">
        {{ 'Actualizar Cuenta' if account else 'Crear Cuenta' }}
      </button>
    </div>
  </div>
</form>
