<form method="POST" action="{{ url_for('accounting.edit_journal_entry', company_id=company_url_id|default(company.id), txn_id=transaction.id) if transaction else url_for('accounting.create_journal_entry', company_id=company_url_id|default(company.id)) }}"
  data-drawer-form data-success-message="{{ 'Asiento contable actualizado' if transaction else 'Asiento contable creado' }} exitosamente"
  onsubmit="return reindexJournalLines()">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="p-4 md:p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Fecha <span class="text-rose-500">*</span></label>
      <input type="date" name="date" value="{{ transaction.date.strftime('%Y-%m-%d') if transaction else now.strftime('%Y-%m-%d') }}" required
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Memo / Descripción <span class="text-rose-500">*</span></label>
        <input type="text" name="memo" value="{{ transaction.memo if transaction else '' }}" required placeholder="Descripción del asiento"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Referencia</label>
        <input type="text" name="reference" value="{{ transaction.reference if transaction else '' }}" placeholder="No. Documento"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
    </div>

    {# Journal Lines #}
    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="block text-sm font-medium text-slate-700">Líneas del Asiento</label>
        <button type="button" id="add-line-btn"
          class="text-xs text-emerald-600 hover:text-emerald-700 font-semibold flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          Añadir Línea
        </button>
      </div>

      <div class="bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
        {# Header #}
        <div class="grid grid-cols-[1fr_auto_auto_auto] gap-0 px-3 py-2 bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-500 uppercase">
          <span>Cuenta</span>
          <span class="w-28 text-right pr-2">Débito</span>
          <span class="w-28 text-right pr-2">Crédito</span>
          <span class="w-8"></span>
        </div>
        <div id="journal-lines" class="divide-y divide-slate-100">
          {% if transaction and transaction.entries %}
            {% for entry in transaction.entries %}
            <div class="journal-line grid grid-cols-[1fr_auto_auto_auto] gap-0 p-2" data-line="{{ loop.index0 }}">
              <select name="lines[{{ loop.index0 }}][account_id]" required
                class="border-0 bg-transparent text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 text-slate-800">
                <option value="">Seleccionar cuenta...</option>
                {% for acct in accounts %}
                <option value="{{ acct.id }}" {{ 'selected' if acct.id == entry.account_id else '' }}>{% if acct.code %}{{ acct.code }} - {% endif %}{{ acct.name }}</option>
                {% endfor %}
              </select>
              <input type="number" name="lines[{{ loop.index0 }}][debit]" step="0.01" min="0" value="{{ entry.debit }}" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono debit-input">
              <input type="number" name="lines[{{ loop.index0 }}][credit]" step="0.01" min="0" value="{{ entry.credit }}" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono credit-input">
              <button type="button" class="remove-line w-8 text-slate-300 hover:text-rose-400 transition-colors flex items-center justify-center" {{ 'style="display:none"' if loop.index0 < 2 else '' }}>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            {% endfor %}
          {% else %}
            {# Line 0 — debit #}
            <div class="journal-line grid grid-cols-[1fr_auto_auto_auto] gap-0 p-2" data-line="0">
              <select name="lines[0][account_id]" required
                class="border-0 bg-transparent text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 text-slate-800">
                <option value="">Seleccionar cuenta...</option>
                {% for acct in accounts %}
                <option value="{{ acct.id }}">{% if acct.code %}{{ acct.code }} - {% endif %}{{ acct.name }}</option>
                {% endfor %}
              </select>
              <input type="number" name="lines[0][debit]" step="0.01" min="0" value="0" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono debit-input">
              <input type="number" name="lines[0][credit]" step="0.01" min="0" value="0" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono credit-input">
              <button type="button" class="remove-line w-8 text-slate-300 hover:text-rose-400 transition-colors flex items-center justify-center" style="display:none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            {# Line 1 — credit #}
            <div class="journal-line grid grid-cols-[1fr_auto_auto_auto] gap-0 p-2" data-line="1">
              <select name="lines[1][account_id]" required
                class="border-0 bg-transparent text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 text-slate-800">
                <option value="">Seleccionar cuenta...</option>
                {% for acct in accounts %}
                <option value="{{ acct.id }}">{% if acct.code %}{{ acct.code }} - {% endif %}{{ acct.name }}</option>
                {% endfor %}
              </select>
              <input type="number" name="lines[1][debit]" step="0.01" min="0" value="0" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono debit-input">
              <input type="number" name="lines[1][credit]" step="0.01" min="0" value="0" placeholder="0.00"
                class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono credit-input">
              <button type="button" class="remove-line w-8 text-slate-300 hover:text-rose-400 transition-colors flex items-center justify-center" style="display:none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          {% endif %}
        </div>
        {# Totals row #}
        <div class="grid grid-cols-[1fr_auto_auto_auto] gap-0 px-3 py-2 bg-slate-100 border-t border-slate-200 text-xs font-bold text-slate-700">
          <span>Totales</span>
          <span id="total-debit" class="w-28 text-right pr-2 font-mono">0.00</span>
          <span id="total-credit" class="w-28 text-right pr-2 font-mono">0.00</span>
          <span id="balance-indicator" class="w-8 flex items-center justify-center"></span>
        </div>
      </div>
    </div>

    <div class="border-t border-slate-200 pt-4">
      <button type="submit" class="w-full flex justify-center items-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors">
        {{ 'Actualizar Asiento' if transaction else 'Crear Asiento' }}
      </button>
    </div>
  </div>
</form>

<script>
function reindexJournalLines() {
  try {
    // Reindex all journal lines to ensure sequential indices starting from 0
    const lines = document.querySelectorAll('.journal-line');
    lines.forEach((line, idx) => {
      line.querySelectorAll('[name]').forEach(field => {
        const name = field.getAttribute('name');
        if (name && name.startsWith('lines[')) {
          // Replace the index in the field name (e.g., lines[5][debit] -> lines[0][debit])
          const newName = name.replace(/lines\[\d+\]/, `lines[${idx}]`);
          field.setAttribute('name', newName);
        }
      });
    });
    return true;
  } catch (error) {
    console.error('Error reindexing journal lines:', error);
    return true; // Allow submission even if reindexing fails
  }
}

(function() {
  let lineCount = document.querySelectorAll('.journal-line').length;
  const accountOptions = `{% for acct in accounts %}<option value="{{ acct.id }}">{% if acct.code %}{{ acct.code }} - {% endif %}{{ acct.name }}</option>{% endfor %}`;

  function updateTotals() {
    let totalD = 0, totalC = 0;
    document.querySelectorAll('.debit-input').forEach(i => totalD += parseFloat(i.value || 0));
    document.querySelectorAll('.credit-input').forEach(i => totalC += parseFloat(i.value || 0));
    document.getElementById('total-debit').textContent = totalD.toFixed(2);
    document.getElementById('total-credit').textContent = totalC.toFixed(2);
    const ind = document.getElementById('balance-indicator');
    if (Math.abs(totalD - totalC) < 0.001) {
      ind.innerHTML = '<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>';
    } else {
      ind.innerHTML = '<svg class="w-4 h-4 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
    }
  }

  document.addEventListener('input', function(e) {
    if (e.target.matches('.debit-input, .credit-input')) updateTotals();
  });

  document.querySelectorAll('.remove-line').forEach(btn => {
    btn.addEventListener('click', function() {
      this.closest('.journal-line').remove();
      updateTotals();
    });
  });

  document.getElementById('add-line-btn').addEventListener('click', function() {
    const idx = lineCount++;
    const div = document.createElement('div');
    div.className = 'journal-line grid grid-cols-[1fr_auto_auto_auto] gap-0 p-2';
    div.dataset.line = idx;
    div.innerHTML = `
      <select name="lines[${idx}][account_id]" class="border-0 bg-transparent text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1">
        <option value="">Seleccionar cuenta...</option>${accountOptions}
      </select>
      <input type="number" name="lines[${idx}][debit]" step="0.01" min="0" value="0" placeholder="0.00"
        class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono debit-input">
      <input type="number" name="lines[${idx}][credit]" step="0.01" min="0" value="0" placeholder="0.00"
        class="w-28 border-0 bg-transparent text-sm text-right focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-2 py-1 font-mono credit-input">
      <button type="button" class="remove-line w-8 text-slate-300 hover:text-rose-400 transition-colors flex items-center justify-center">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>`;
    document.getElementById('journal-lines').appendChild(div);
    div.querySelector('.remove-line').addEventListener('click', () => { div.remove(); updateTotals(); });
  });

  updateTotals();
})();
</script>
