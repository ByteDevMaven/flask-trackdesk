<form method="POST"
  action="{{ url_for('accounting.create_project', company_id=company.id) }}"
  data-drawer-form data-success-message="Centro de costos (Proyecto) creado.">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del Proyecto / Centro de Costos <span class="text-rose-500">*</span></label>
      <input type="text" name="name" required placeholder="Ej: Evento Anual 2026"
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
      <textarea name="description" rows="2" placeholder="Detalles u objetivos del proyecto..."
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Presupuesto Asignado</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">{{ company.currency }}</span>
          <input type="number" name="budget" step="0.01" min="0" placeholder="0.00"
            class="w-full pl-8 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
        <select name="status" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
          <option value="active">Activo</option>
          <option value="completed">Completado</option>
          <option value="on_hold">En Pausa</option>
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha de Inicio</label>
        <input type="date" name="start_date"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Fecha Fin (Estimada)</label>
        <input type="date" name="end_date"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
    </div>
    
    <div class="border-t border-slate-200 pt-4 mt-2">
      <p class="text-xs text-slate-500 mb-3 bg-slate-50 p-2 rounded-lg">
        Al crear un Centro de Costos, podrás etiquetar ingresos y gastos a este proyecto para hacer un seguimiento de rentabilidad individual.
      </p>
      <button type="submit" class="w-full flex justify-center items-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors">
        Crear Proyecto
      </button>
    </div>
  </div>
</form>
