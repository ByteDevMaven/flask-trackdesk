<form method="POST"
  action="{{ url_for('accounting.edit_project', company_id=company.id, project_id=project.id) if project else url_for('accounting.create_project', company_id=company.id) }}"
  data-drawer-form
  data-success-message="{{ 'Proyecto actualizado exitosamente' if project else 'Proyecto creado exitosamente' }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del Proyecto <span class="text-rose-500">*</span></label>
      <input type="text" name="name" required placeholder="Ej: Rediseño Web Q3 2026"
        value="{{ project.name if project else '' }}"
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
      <textarea name="description" rows="3" placeholder="Descripción del proyecto..."
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none">{{ project.description or '' if project else '' }}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Presupuesto</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">{{ company.currency }}</span>
          <input type="number" name="budget" step="0.01" min="0" placeholder="0.00"
            value="{{ '%.2f'|format(project.budget|float) if project and project.budget else '' }}"
            class="w-full pl-8 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
        <select name="status" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
          <option value="active" {{ 'selected' if not project or project.status == 'active' }}>Activo</option>
          <option value="on_hold" {{ 'selected' if project and project.status == 'on_hold' }}>En espera</option>
          <option value="completed" {{ 'selected' if project and project.status == 'completed' }}>Completado</option>
          <option value="cancelled" {{ 'selected' if project and project.status == 'cancelled' }}>Cancelado</option>
        </select>
      </div>
    </div>

    <div class="border-t border-slate-200 pt-4 mt-2">
      <button type="submit" class="w-full flex justify-center items-center gap-2 px-4 py-2.5 bg-amber-500 text-white rounded-lg text-sm font-medium hover:bg-amber-600 transition-colors">
        {{ 'Actualizar Proyecto' if project else 'Crear Proyecto' }}
      </button>
    </div>
  </div>
</form>
