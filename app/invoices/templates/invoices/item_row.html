<tr class="border-b border-slate-50 item-row">
  <td class="px-4 py-2">
    <select name="items[{{ index }}][inventory_item_id]"
            class="w-full text-sm border border-slate-200 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-emerald-500 bg-white item-product">
      <option value="">Manual</option>
      {% for inv in inventory_items %}
      <option value="{{ inv.id }}" data-price="{{ inv.price }}"
              {{ 'selected' if item and item.inventory_item_id == inv.id else '' }}>{{ inv.name }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="px-4 py-2">
    <input type="text" name="items[{{ index }}][description]"
           value="{{ item.description if item else '' }}"
           placeholder="Descripción..."
           class="w-full text-sm border border-slate-200 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-emerald-500">
  </td>
  <td class="px-4 py-2">
    <input type="number" name="items[{{ index }}][quantity]"
           value="{{ item.quantity if item else 1 }}"
           min="1" step="1"
           class="w-full text-sm border border-slate-200 rounded px-2 py-1 focus:outline-none text-right item-qty">
  </td>
  <td class="px-4 py-2">
    <input type="number" name="items[{{ index }}][unit_price]"
           value="{{ item.unit_price if item else 0 }}"
           min="0" step="0.01"
           class="w-full text-sm border border-slate-200 rounded px-2 py-1 focus:outline-none text-right item-price">
  </td>
  <td class="px-4 py-2 text-sm font-medium text-slate-900 text-right item-subtotal">
    {{ "%.2f"|format((item.quantity or 0) * (item.unit_price or 0) if item else 0) }}
  </td>
  <td class="px-2 py-2">
    <button type="button" class="remove-item text-slate-400 hover:text-rose-500 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </td>
</tr>
