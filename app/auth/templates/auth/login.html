<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – TrackDesk ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <!-- Flash messages renderizados como data-attributes -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div data-flash-message="{{ message }}" data-flash-category="{{ category }}" class="hidden"></div>
    {% endfor %}
  {% endwith %}

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-600 rounded-xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">Bienvenido de nuevo</h1>
      <p class="text-slate-500 mt-1 text-sm">Inicia sesión en tu cuenta de TrackDesk</p>
    </div>

    <!-- Card de login -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
            Correo electrónico
          </label>
          <input id="email" type="email" name="email" required
                 placeholder="tu@empresa.com"
                 autocomplete="email"
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors">
        </div>

        <!-- Contraseña -->
        <div class="mb-5">
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-medium text-slate-700">Contraseña</label>
          </div>
          <div class="relative">
            <input id="password" type="password" name="password" required
                   placeholder="Tu contraseña"
                   autocomplete="current-password"
                   class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors pr-10">
            <button type="button" id="toggle-password"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
              <svg class="w-5 h-5" id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Recordarme -->
        <div class="flex items-center mb-6">
          <input type="checkbox" id="remember" name="remember"
                 class="w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
          <label for="remember" class="ml-2 text-sm text-slate-600">Mantener sesión iniciada</label>
        </div>

        <!-- Botón -->
        <button type="submit"
                class="w-full bg-emerald-600 text-white py-2.5 px-4 rounded-lg text-sm font-medium hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors">
          Iniciar sesión
        </button>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80"></div>

  <script src="{{ url_for('static', filename='js/modals.js') }}"></script>
  <script>
    // Toggle de contraseña - sin Jinja, puro DOM
    document.getElementById('toggle-password').addEventListener('click', function() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
