<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña – TrackDesk ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
  <link rel="shortcut icon" href="/static/img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Trackdesk" />
  <link rel="manifest" href="/static/img/site.webmanifest" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
  <div data-flash-message="{{ message }}" data-flash-category="{{ category }}" class="hidden"></div>
  {% endfor %}
  {% endwith %}

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-600 rounded-xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">Recuperar contraseña</h1>
      <p class="text-slate-500 mt-1 text-sm">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-6">
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
            Correo electrónico
          </label>
          <input id="email" type="email" name="email" required placeholder="tu@empresa.com" autocomplete="email"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors">
        </div>

        <button type="submit"
          class="w-full bg-emerald-600 text-white py-2.5 px-4 rounded-lg text-sm font-medium hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors mb-4">
          Enviar enlace de recuperación
        </button>

        <div class="text-center">
          <a href="{{ url_for('auth.login') }}" class="text-sm font-medium text-emerald-600 hover:text-emerald-500">
            Volver a Iniciar Sesión
          </a>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80"></div>

  <script src="{{ url_for('static', filename='js/modals.js') }}"></script>
</body>

</html>
