<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Establecer Nueva Contraseña – TrackDesk ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
  <link rel="shortcut icon" href="/static/img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Trackdesk" />
  <link rel="manifest" href="/static/img/site.webmanifest" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
  <div data-flash-message="{{ message }}" data-flash-category="{{ category }}" class="hidden"></div>
  {% endfor %}
  {% endwith %}

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-600 rounded-xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">Establecer Nueva Contraseña</h1>
      <p class="text-slate-500 mt-1 text-sm">Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
      <form method="POST" action="{{ url_for('auth.reset_password', token=token, email=email) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">
            Nueva Contraseña
          </label>
          <div class="relative">
            <input id="password" type="password" name="password" required placeholder="Mínimo 8 caracteres"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors pr-10">
          </div>
        </div>

        <div class="mb-6">
          <label for="password_confirm" class="block text-sm font-medium text-slate-700 mb-1.5">
            Confirmar Contraseña
          </label>
          <div class="relative">
            <input id="password_confirm" type="password" name="password_confirm" required
              placeholder="Repite tu contraseña"
              class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors pr-10">
          </div>
        </div>

        <button type="submit"
          class="w-full bg-emerald-600 text-white py-2.5 px-4 rounded-lg text-sm font-medium hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors mb-4">
          Guardar y Entrar
        </button>

        <div class="text-center">
          <a href="{{ url_for('auth.login') }}" class="text-sm font-medium text-emerald-600 hover:text-emerald-500">
            Volver a Iniciar Sesión
          </a>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80"></div>

  <script src="{{ url_for('static', filename='js/modals.js') }}"></script>
</body>

</html>
